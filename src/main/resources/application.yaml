spring:
  application:
    name: health-tracker-api
  datasource:
    url: jdbc:postgresql://localhost:5432/health-tracker
    username: health_user
    password: very_secure_password
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true